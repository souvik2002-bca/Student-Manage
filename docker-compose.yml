version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: sms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - sms-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/student-management
      - JWT_SECRET=your_secret_key_here_for_local_testing
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - sms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sms-network

volumes:
  mongodb_data:

networks:
  sms-network:
    driver: bridge
